services:
  zigbin:
    build: .
    ports:
      - "5882:5882"
    volumes:
      - zigbin_data:/app/data
    environment:
      - ZIGBIN_PORT=5882
      - ZIGBIN_DB_PATH=/app/data/zigbin.db
      - ZIGBIN_ENCRYPTION_KEY=super-secret-zigbin-default-passphrase-2026
      - ZIGBIN_TRUST_PROXY=true
      - ZIGBIN_CORS_ORIGIN=* # Set your web URL here (e.g. https://yourweb.com) to restrict API access
    restart: unless-stopped
  
volumes:
  zigbin_data:
