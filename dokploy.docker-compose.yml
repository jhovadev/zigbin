services:
  zigbin:
    build: .
    volumes:
      - zigbin_data:/app/data
    environment:
      - ZIGBIN_PORT=5882
      - ZIGBIN_DB_PATH=/app/data/zigbin.db
      - ZIGBIN_ENCRYPTION_KEY=super-secret-zigbin-default-passphrase-2026
      - ZIGBIN_TRUST_PROXY=true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5882/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  zigbin_data:
