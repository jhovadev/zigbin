services:
  zigbin:
    build: .
    volumes:
      - zigbin_data:/app/data
    environment:
      - ZIGBIN_PORT=${ZIGBIN_PORT:-5882}
      - ZIGBIN_DB_PATH=${ZIGBIN_DB_PATH:-/app/data/zigbin.db}
      - ZIGBIN_ENCRYPTION_KEY=${ZIGBIN_ENCRYPTION_KEY:-super-secret-zigbin-default-passphrase-2026}
      - ZIGBIN_TRUST_PROXY=${ZIGBIN_TRUST_PROXY:-true}
      - ZIGBIN_CORS_ORIGIN=${ZIGBIN_CORS_ORIGIN:-*}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:${ZIGBIN_PORT:-5882}/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
#    expose:
#      - "5882"

volumes:
  zigbin_data:
